name: Deploy — Supabase Edge Functions

on:
  push:
    branches: [main]
    # Gira solo quando cambiano le Edge Functions o la loro configurazione
    paths:
      - 'supabase/functions/**'

  # Trigger manuale per forzare un re-deploy (es. dopo rotazione API key)
  workflow_dispatch:
    inputs:
      function:
        description: 'Nome funzione da deployare (vuoto = tutte)'
        required: false
        default: ''

jobs:
  # Job di guardia: gira sempre e determina se c'è qualcosa da deployare.
  # Serve a evitare che GitHub marchi il run come "No jobs were run" (= failed).
  check:
    name: Verifica modifiche
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' | grep -q .; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Nessuna funzione modificata in questo commit — deploy saltato."
          fi

  deploy-functions:
    name: Deploy Edge Functions
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions modificate
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          PROJECT_REF="olagntawajefdjrkkvcc"

          # Helper: deploya una singola funzione (skip directory interne _*)
          deploy_fn() {
            local fn="$1"
            [[ "$fn" == _* ]] && return 0
            echo "→ Deploy: $fn"
            supabase functions deploy "$fn" \
              --project-ref "$PROJECT_REF" --no-verify-jwt
          }

          # Dispatch manuale: deploya funzione specifica o tutte
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.function }}" ]; then
              deploy_fn "${{ github.event.inputs.function }}"
            else
              echo "→ Deploy manuale: tutte le funzioni"
              for fn in supabase/functions/*/; do
                fn="${fn%/}"; fn="${fn##*/}"
                deploy_fn "$fn"
              done
            fi
            exit 0
          fi

          # Push automatico: rileva le directory cambiate nell'ultimo commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'supabase/functions/' \
            | grep -oP 'supabase/functions/\K[^/]+' | sort -u)

          DEPLOY_ALL=false
          for item in $CHANGED; do
            # Se cambia _shared (o altra dir interna), bisogna deployare
            # tutte le funzioni consumer che la importano.
            [[ "$item" == _* ]] && DEPLOY_ALL=true && break
          done

          if [ "$DEPLOY_ALL" = "true" ]; then
            echo "→ _shared modificata — ri-deploy di tutte le funzioni consumer"
            for fn in supabase/functions/*/; do
              fn="${fn%/}"; fn="${fn##*/}"
              deploy_fn "$fn"
            done
          else
            for fn in $CHANGED; do
              deploy_fn "$fn"
            done
          fi

      - name: Riepilogo deploy
        run: echo "✓ Deploy completato — https://supabase.com/dashboard/project/olagntawajefdjrkkvcc/functions"
