name: CI — Test

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]
    paths-ignore:
      - 'blog-*.html'
      - 'sitemap.xml'
      - 'blog-queue.json'

jobs:
  test:
    name: Unit + Integration tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Nessun npm install: i test usano solo moduli built-in di Node (node:test,
      # node:assert) e file locali — zero dipendenze esterne da installare.

      - name: Unit test (offline, veloci)
        run: npm run test:unit

      - name: Integration test (rete — proxy Supabase)
        env:
          TEST_USER_TOKEN: ${{ secrets.TEST_USER_TOKEN }}
        run: |
          if [ -n "$TEST_USER_TOKEN" ]; then
            npm run test:int
          else
            echo "⚠️  TEST_USER_TOKEN non configurato — integration test saltati."
          fi
